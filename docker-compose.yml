services:
  postgres:
    image: postgres:16-alpine
    container_name: datapulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datapulse}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datapulse}"]
      interval: 5s
      timeout: 5s
      retries: 5

