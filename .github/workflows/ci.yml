name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    # Postgres+PostGIS reale: i test API esercitano davvero ST_DWithin/trigger geom.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: datapulse
          POSTGRES_PASSWORD: datapulse
          POSTGRES_DB: datapulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datapulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://datapulse:datapulse@localhost:5432/datapulse
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[etl,api,db,dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Migrate (alembic)
        run: alembic -c db/alembic.ini upgrade head
      - name: Test (pytest)
        run: pytest

  frontend:
    name: Frontend (eslint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Lint (eslint)
        run: npm run lint --if-present
      - name: Test (vitest)
        run: npm run test --if-present
