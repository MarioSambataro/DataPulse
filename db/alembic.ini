# Alembic — migrazioni DataPulse (SEZIONE 2).
# La URL del DB NON è qui: viene letta da DATABASE_URL (.env) in migrations/env.py.
# Eseguire dalla root del repo:  alembic -c db/alembic.ini upgrade head

[alembic]
# %(here)s = cartella di questo file (db/), così i path sono indipendenti dal cwd.
script_location = %(here)s/migrations
prepend_sys_path = %(here)s/..
path_separator = os

# Nome dei file di revisione: <slug>_<descrizione>.
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
